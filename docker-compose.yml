services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rugradar_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "84532"]
    ports:
      - "8545:8545"

volumes:
  pgdata:
