version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rugradar_postgres_local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rugradar_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rugradar_redis_local
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: rugradar_anvil_local
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "84532"]
    ports:
      - "${ANVIL_PORT:-8545}:8545"
    restart: unless-stopped

volumes:
  pgdata_local:
