version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rugradar_backend_prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://prod_user:prod_password@postgres:5432/rugradar_prod
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  postgres:
    image: postgres:16-alpine
    container_name: rugradar_postgres_prod
    environment:
      POSTGRES_DB: rugradar_prod
      POSTGRES_USER: prod_user
      POSTGRES_PASSWORD: prod_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: rugradar_redis_prod
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

volumes:
  pgdata_prod:
